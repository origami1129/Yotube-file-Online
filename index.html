<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Video Drive</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h1 { font-size: 1.5rem; color: #333; text-align: center; }
        .upload-area { border: 2px dashed #007bff; padding: 20px; text-align: center; border-radius: 8px; margin: 20px 0; cursor: pointer; }
        #video-player { width: 100%; border-radius: 8px; display: none; margin-top: 20px; }
        .status { font-size: 0.9rem; color: #666; text-align: center; }
        #share-url { word-break: break-all; color: #007bff; font-size: 0.8rem; margin-top: 10px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎬 Youtube fire Online</h1>
    
    <div class="upload-area" onclick="document.getElementById('file-input').click()">
        <p>ここをクリックして動画を選択</p>
        <input type="file" id="file-input" accept="video/*" style="display: none;">
    </div>

    <div id="status-text" class="status">動画をアップロードするとここに表示されるよ</div>
    
    <video id="video-player" controls></video>
    <a id="share-url" target="_blank"></a>
</div>

<script>
    // --- ここにあなたの設定を入れてね ---
    const CLOUD_NAME = "あなたのクラウド名"; 
    const UPLOAD_PRESET = "あなたのアップロードプリセット名";
    // ----------------------------------

    const fileInput = document.getElementById('file-input');
    const statusText = document.getElementById('status-text');
    const videoPlayer = document.getElementById('video-player');
    const shareUrl = document.getElementById('share-url');

    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        statusText.innerText = "アップロード中... 🚀 (少し時間がかかるよ)";
        
        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', UPLOAD_PRESET);

        try {
            const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`, {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (data.secure_url) {
                statusText.innerText = "アップロード完了！✨";
                videoPlayer.src = data.secure_url;
                videoPlayer.style.display = "block";
                shareUrl.href = data.secure_url;
                shareUrl.innerText = "🔗 この動画の直リンク";
            } else {
                statusText.innerText = "エラーが起きたみたい。設定を確認してね。";
            }
        } catch (error) {
            console.error(error);
            statusText.innerText = "通信エラーが発生したよ。";
        }
    });
</script>

</body>
</html>
