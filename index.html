<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Youtube File Online</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 600px; background: #2d2d2d; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { text-align: center; color: #00d4ff; }
        .upload-btn { display: block; width: 100%; padding: 15px; background: #00d4ff; color: #000; text-align: center; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 20px; }
        .upload-btn:hover { background: #00b8e6; }
        #video-list { display: grid; gap: 20px; }
        .video-card { background: #3d3d3d; padding: 10px; border-radius: 8px; }
        video { width: 100%; border-radius: 5px; background: #000; }
        .info { margin-top: 10px; font-size: 0.8rem; color: #aaa; display: flex; justify-content: space-between; }
        button.delete { background: #ff4d4d; border: none; color: white; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>▶ Youtube File </h1>
    
    <label class="upload-btn">
        動画をアップロード（保存）
        <input type="file" id="file-input" accept="video/*" style="display: none;">
    </label>

    <div id="status"></div>
    <div id="video-list"></div>
</div>

<script>
    const dbName = "VideoDriveDB";
    const storeName = "videos";

    // DBの初期化
    const request = indexedDB.open(dbName, 1);
    request.onupgradeneeded = (e) => {
        e.target.result.createObjectStore(storeName, { keyPath: "id", autoIncrement: true });
    };

    request.onsuccess = (e) => {
        const db = e.target.result;
        displayVideos(db);

        document.getElementById('file-input').addEventListener('change', async (event) => {
            const file = event.target.files[0];
            if (!file) return;

            const status = document.getElementById('status');
            status.innerText = "保存中...（ブラウザに直接書き込んでいます）";

            const reader = new FileReader();
            reader.onload = (re) => {
                const transaction = db.transaction([storeName], "readwrite");
                const store = transaction.objectStore(storeName);
                store.add({ name: file.name, data: re.target.result, type: file.type });

                transaction.oncomplete = () => {
                    status.innerText = "保存完了！";
                    displayVideos(db);
                };
            };
            reader.readAsArrayBuffer(file);
        });
    };

    // 動画一覧を表示
    function displayVideos(db) {
        const list = document.getElementById('video-list');
        list.innerHTML = "";
        const transaction = db.transaction([storeName], "readonly");
        const store = transaction.objectStore(storeName);

        store.openCursor().onsuccess = (e) => {
            const cursor = e.target.result;
            if (cursor) {
                const videoData = cursor.value;
                const blob = new Blob([videoData.data], { type: videoData.type });
                const url = URL.createObjectURL(blob);

                const card = document.createElement('div');
                card.className = 'video-card';
                card.innerHTML = `
                    <video src="${url}" controls></video>
                    <div class="info">
                        <span>${videoData.name}</span>
                        <button class="delete" onclick="deleteVideo(${videoData.id})">削除</button>
                    </div>
                `;
                list.appendChild(card);
                cursor.continue();
            }
        };
    }

    // 動画削除
    window.deleteVideo = (id) => {
        const dbRequest = indexedDB.open(dbName, 1);
        dbRequest.onsuccess = (e) => {
            const db = e.target.result;
            const transaction = db.transaction([storeName], "readwrite");
            transaction.objectStore(storeName).delete(id);
            transaction.oncomplete = () => location.reload();
        };
    };
</script>

</body>
</html>
